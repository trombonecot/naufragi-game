<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naufragi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap');

  :root {
    --ink: #1a1a1a;
    --line: #999;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', 'Georgia', serif;
    color: var(--ink);
    background: #e8e4df;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 16px;
  }

  h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 600;
    letter-spacing: .04em;
    text-align: center;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 340px;
  }

  .menu button {
    font-family: 'EB Garamond', 'Georgia', serif;
    font-size: 1.3rem;
    padding: 16px 24px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.1);
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .menu button:hover {
    background: #1a1a1a;
    color: #f5f1ec;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,.2);
  }
</style>
</head>
<body>
  <h1>Naufragi</h1>
  <nav class="menu">
    <button onclick="location.href='naufragi.html'">Naufragi</button>
    <button onclick="location.href='portadores.html'">Portadores de llum</button>
    <button onclick="alert('Not implemented')">Buidor estel·lar</button>
  </nav>
</body>
</html>
